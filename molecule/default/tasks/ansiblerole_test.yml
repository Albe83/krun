      apiVersion: roles.krun.io/v1alpha1
      kind: AnsibleRole
      metadata:
        name: ansiblerole-test-valid-mixed
      spec:
        tasks:
        - id: main-task-a
          task: ansibletask-role-a
        - id: main-block-a
          block: ansibleblock-role-a

