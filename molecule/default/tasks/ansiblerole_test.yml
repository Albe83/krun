---
- name: Create referenced AnsibleTask resources for role tests
  k8s:
    state: present
    namespace: '{{ namespace }}'
    definition:
      apiVersion: tasks.krun.io/v1alpha1
      kind: AnsibleTask
      metadata:
        name: '{{ item }}'
      spec:
        action: ansible.builtin.debug
        args:
          msg: 'Task {{ item }} for role tests'
  loop:
  - ansibletask-role-a
  - ansibletask-role-b

- name: Create referenced AnsibleBlock resources for role tests
  k8s:
    state: present
    namespace: '{{ namespace }}'
    definition:
      apiVersion: blocks.krun.io/v1alpha1
      kind: AnsibleBlock
      metadata:
        name: '{{ item.name }}'
      spec:
        block:
        - id: '{{ item.id }}'
          task: '{{ item.task }}'
  loop:
  - name: ansibleblock-role-a
    id: block-a
    task: ansibletask-role-a
  - name: ansibleblock-role-b
    id: block-b
    task: ansibletask-role-b

- name: Create valid AnsibleRole (task-only) and wait Ready=True
  k8s:
    state: present
    namespace: '{{ namespace }}'
    wait: yes
    wait_timeout: 300
    wait_condition:
      type: Ready
      status: "True"
    definition:
      apiVersion: roles.krun.io/v1alpha1
      kind: AnsibleRole
      metadata:
        name: ansiblerole-test-valid-task-only
      spec:
        preTasks:
        - id: pre-a
          task: ansibletask-role-a
        tasks:
        - id: main-a
          task: ansibletask-role-a
        - id: main-b
          task: ansibletask-role-b

- name: Fetch task-only AnsibleRole status
  k8s_info:
    api_version: roles.krun.io/v1alpha1
    kind: AnsibleRole
    namespace: '{{ namespace }}'
    name: ansiblerole-test-valid-task-only
  register: ansiblerole_task_only_info

- name: Validate task-only role acceptance
  assert:
    that:
    - ansiblerole_task_only_info.resources | length == 1
    - ansiblerole_task_only_info.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length == 1
    - ansiblerole_task_only_info.resources[0].status.conditions | selectattr('reason', 'equalto', 'SpecAccepted') | list | length == 1

- name: Create valid AnsibleRole (block-only) and wait Ready=True
  k8s:
    state: present
    namespace: '{{ namespace }}'
    wait: yes
    wait_timeout: 300
    wait_condition:
      type: Ready
      status: "True"
    definition:
      apiVersion: roles.krun.io/v1alpha1
      kind: AnsibleRole
      metadata:
        name: ansiblerole-test-valid-block-only
      spec:
        tasks:
        - id: main-block-a
          block: ansibleblock-role-a
        - id: main-block-b
          block: ansibleblock-role-b

- name: Fetch block-only AnsibleRole status
  k8s_info:
    api_version: roles.krun.io/v1alpha1
    kind: AnsibleRole
    namespace: '{{ namespace }}'
    name: ansiblerole-test-valid-block-only
  register: ansiblerole_block_only_info

- name: Validate block-only role acceptance
  assert:
    that:
    - ansiblerole_block_only_info.resources | length == 1
    - ansiblerole_block_only_info.resources[0].status.conditions | selectattr('type', 'equalto', 'Ready') | selectattr('status', 'equalto', 'True') | list | length == 1
    - ansiblerole_block_only_info.resources[0].status.conditions | selectattr('reason', 'equalto', 'SpecAccepted') | list | length == 1

