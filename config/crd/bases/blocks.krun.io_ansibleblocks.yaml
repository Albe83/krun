---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: ansibleblocks.blocks.krun.io
spec:
  group: blocks.krun.io
  names:
    kind: AnsibleBlock
    listKind: AnsibleBlockList
    plural: ansibleblocks
    singular: ansibleblock
    shortNames:
    - ablock
  scope: Namespaced
  versions:
  - name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AnsibleBlock is the Schema for reusable Ansible block composition.
        properties:
          apiVersion:
            description: 'APIVersion defines the versioned schema of this representation of an object.'
            type: string
          kind:
            description: 'Kind is a string value representing the REST resource this object represents.'
            type: string
          metadata:
            type: object
          spec:
            description: Spec defines block phases as references to AnsibleTask resources.
            type: object
            properties:
              block:
                description: Ordered list of tasks for the main block section.
                type: array
                minItems: 1
                items:
                  type: object
                  required:
                  - id
                  - task
                  properties:
                    id:
                      description: Unique step identifier within this section.
                      type: string
                      minLength: 1
                    task:
                      description: Referenced AnsibleTask metadata.name in the same namespace.
                      type: string
                      minLength: 1
              rescue:
                description: Ordered list of tasks for the rescue section.
                type: array
                items:
                  type: object
                  required:
                  - id
                  - task
                  properties:
                    id:
                      description: Unique step identifier within this section.
                      type: string
                      minLength: 1
                    task:
                      description: Referenced AnsibleTask metadata.name in the same namespace.
                      type: string
                      minLength: 1
              always:
                description: Ordered list of tasks for the always section.
                type: array
                items:
                  type: object
                  required:
                  - id
                  - task
                  properties:
                    id:
                      description: Unique step identifier within this section.
                      type: string
                      minLength: 1
                    task:
                      description: Referenced AnsibleTask metadata.name in the same namespace.
                      type: string
                      minLength: 1
            required:
            - block
          status:
            description: Status contains observed information about the block resource.
            type: object
            properties:
              observedGeneration:
                description: Most recent spec generation observed by the operator.
                type: integer
                format: int64
                minimum: 0
              message:
                description: Last reconciliation message.
                type: string
              conditions:
                description: Standard status conditions for this resource.
                type: array
                items:
                  type: object
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  properties:
                    type:
                      type: string
                      minLength: 1
                    status:
                      type: string
                      pattern: ^(True|False|Unknown)$
                    reason:
                      type: string
                    message:
                      type: string
                    lastTransitionTime:
                      type: string
                      format: date-time
                    observedGeneration:
                      type: integer
                      format: int64
                      minimum: 0
        type: object
    served: true
    storage: true
    subresources:
      status: {}
