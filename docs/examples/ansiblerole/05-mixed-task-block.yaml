apiVersion: roles.krun.io/v1alpha1
kind: AnsibleRole
metadata:
  name: ansiblerole-example-05-mixed-task-block
spec:
  preTasks:
  - id: pre-task
    task: ansibletask-sample
  tasks:
  - id: main-task-a
    task: ansibletask-sample
  - id: main-block-a
    block: ansibleblock-sample
  handlers:
  - id: handler-block
    block: ansibleblock-sample
