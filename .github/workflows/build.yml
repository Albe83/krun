name: Build

on:
  pull_request:
  push:
    branches:
    - main

permissions:
  contents: read
  packages: write

jobs:
  build-sanity:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: v1.35.0

    - name: Render CRD manifests
      run: kubectl kustomize config/crd >/tmp/crd.yaml

    - name: Render sample manifests
      run: kubectl kustomize config/samples >/tmp/samples.yaml

    - name: Render default manifests
      run: kubectl kustomize config/default >/tmp/default.yaml

    - name: Validate AnsibleTask and AnsibleRole YAML examples
      run: |
        python3 - <<'PY'
        import glob
        import yaml

        task_paths = [
            'config/samples/tasks_v1alpha1_ansibletask.yaml',
            *sorted(glob.glob('docs/examples/ansibletask/*.yaml')),
        ]
        role_paths = [
            'config/samples/roles_v1alpha1_ansiblerole.yaml',
            *sorted(glob.glob('docs/examples/ansiblerole/*.yaml')),
        ]
        paths = task_paths + role_paths

        if not paths:
            raise SystemExit('No YAML files found for validation')

        for path in paths:
            with open(path, 'r', encoding='utf-8') as f:
                data = yaml.safe_load(f)

            if not isinstance(data, dict):
                raise SystemExit(f'{path}: top-level YAML must be an object')

            kind = data.get('kind')
            if kind not in {'AnsibleTask', 'AnsibleRole'}:
                raise SystemExit(f"{path}: kind must be 'AnsibleTask' or 'AnsibleRole'")

            spec = data.get('spec')
            if not isinstance(spec, dict):
                raise SystemExit(f'{path}: spec must be an object')

            if kind == 'AnsibleTask':
                action = spec.get('action')
                if not isinstance(action, str) or not action.strip():
                    raise SystemExit(f'{path}: spec.action is required and must be non-empty')
                if 'name' in spec:
                    raise SystemExit(f'{path}: spec.name is not allowed, use metadata.name')

            if kind == 'AnsibleRole':
                tasks = spec.get('tasks')
                if not isinstance(tasks, list) or not tasks:
                    raise SystemExit(f'{path}: spec.tasks is required and must be a non-empty array')

                for section in ('preTasks', 'tasks', 'postTasks', 'handlers'):
                    refs = spec.get(section, [])
                    if refs is None:
                        refs = []
                    if not isinstance(refs, list):
                        raise SystemExit(f'{path}: spec.{section} must be an array')

                    seen_ids = set()
                    for idx, ref in enumerate(refs):
                        if not isinstance(ref, dict):
                            raise SystemExit(f'{path}: spec.{section}[{idx}] must be an object')
                        ref_id = ref.get('id')
                        ref_task = ref.get('task')
                        if not isinstance(ref_id, str) or not ref_id.strip():
                            raise SystemExit(f'{path}: spec.{section}[{idx}].id is required and must be non-empty')
                        if not isinstance(ref_task, str) or not ref_task.strip():
                            raise SystemExit(f'{path}: spec.{section}[{idx}].task is required and must be non-empty')
                        if ref_id in seen_ids:
                            raise SystemExit(f'{path}: spec.{section} contains duplicated id value {ref_id!r}')
                        seen_ids.add(ref_id)

        print(f'Validated {len(paths)} files')
        PY

  build-image:
    runs-on: ubuntu-latest
    needs: build-sanity
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/krun
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix=sha-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and publish image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build summary
      run: |
        {
          echo "### Operator Image"
          echo ""
          echo "- Image: \`${IMAGE_NAME}\`"
          echo "- Tags:"
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
          if [ -n "${{ steps.build.outputs.digest }}" ]; then
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
          fi
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "- Publish: enabled (main branch)"
          else
            echo "- Publish: disabled (non-main branch)"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
