name: Build

on:
  pull_request:
  push:
    branches:
    - main

permissions:
  contents: read
  packages: write

jobs:
  build-sanity:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup kubectl
      uses: azure/setup-kubectl@v4
      with:
        version: v1.35.0

    - name: Render CRD manifests
      run: kubectl kustomize config/crd >/tmp/crd.yaml

    - name: Render sample manifests
      run: kubectl kustomize config/samples >/tmp/samples.yaml

    - name: Render default manifests
      run: kubectl kustomize config/default >/tmp/default.yaml

    - name: Validate AnsibleTask YAML examples
      run: |
        python3 - <<'PY'
        import glob
        import yaml

        paths = [
            'config/samples/tasks_v1alpha1_ansibletask.yaml',
            *sorted(glob.glob('docs/examples/ansibletask/*.yaml')),
        ]

        if not paths:
            raise SystemExit('No YAML files found for validation')

        for path in paths:
            with open(path, 'r', encoding='utf-8') as f:
                data = yaml.safe_load(f)

            if not isinstance(data, dict):
                raise SystemExit(f'{path}: top-level YAML must be an object')

            if data.get('kind') != 'AnsibleTask':
                raise SystemExit(f"{path}: kind must be 'AnsibleTask'")

            spec = data.get('spec')
            if not isinstance(spec, dict):
                raise SystemExit(f'{path}: spec must be an object')

            action = spec.get('action')
            if not isinstance(action, str) or not action.strip():
                raise SystemExit(f'{path}: spec.action is required and must be non-empty')

            if 'name' in spec:
                raise SystemExit(f'{path}: spec.name is not allowed, use metadata.name')

        print(f'Validated {len(paths)} files')
        PY

  build-image:
    runs-on: ubuntu-latest
    needs: build-sanity
    env:
      IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/krun
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3

    - name: Log in to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: Extract image metadata
      id: meta
      uses: docker/metadata-action@v5
      with:
        images: ${{ env.IMAGE_NAME }}
        tags: |
          type=sha,prefix=sha-
          type=raw,value=latest,enable={{is_default_branch}}

    - name: Build and publish image
      id: build
      uses: docker/build-push-action@v6
      with:
        context: .
        file: ./Dockerfile
        platforms: linux/amd64
        push: ${{ github.ref == 'refs/heads/main' }}
        tags: ${{ steps.meta.outputs.tags }}
        labels: ${{ steps.meta.outputs.labels }}

    - name: Build summary
      run: |
        {
          echo "### Operator Image"
          echo ""
          echo "- Image: \`${IMAGE_NAME}\`"
          echo "- Tags:"
          echo "${{ steps.meta.outputs.tags }}" | sed 's/^/  - /'
          if [ -n "${{ steps.build.outputs.digest }}" ]; then
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
          fi
          if [ "${{ github.ref }}" = "refs/heads/main" ]; then
            echo "- Publish: enabled (main branch)"
          else
            echo "- Publish: disabled (non-main branch)"
          fi
        } >> "$GITHUB_STEP_SUMMARY"
