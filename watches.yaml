---
# Use the 'create api' subcommand to add watches to this file.
- version: v1alpha1
  group: tasks.krun.io
  kind: AnsibleTask
  role: ansibletask
- version: v1alpha1
  group: roles.krun.io
  kind: AnsibleRole
  role: ansiblerole
  reconcilePeriod: 60s
- version: v1alpha1
  group: blocks.krun.io
  kind: AnsibleBlock
  role: ansibleblock
  reconcilePeriod: 60s
